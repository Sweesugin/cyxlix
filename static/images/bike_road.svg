<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#00b8ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Card -->
  <rect width="200" height="120" rx="10" fill="url(#bgGrad)" />
  <line x1="10" y1="95" x2="190" y2="95" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  
  <!-- Bicycle Art Group -->
  <g transform="translate(30, 20)">
    <!-- Wheels (thinner for road bike) -->
    <circle cx="30" cy="65" r="22" stroke="#64748b" stroke-width="2" fill="none" />
    <circle cx="110" cy="65" r="22" stroke="#64748b" stroke-width="2" fill="none" />
    
    <!-- Spokes (dense) -->
    <path d="M 30 43 L 30 87 M 8 65 L 52 65 M 15 50 L 45 80 M 15 80 L 45 50" stroke="#475569" stroke-width="0.8"/>
    <path d="M 110 43 L 110 87 M 88 65 L 132 65 M 95 50 L 125 80 M 95 80 L 125 50" stroke="#475569" stroke-width="0.8"/>
    
    <!-- Frame (sleek road geometry) -->
    <path d="M 30 65 L 67 65 L 98 36 L 53 36 L 30 65 Z" fill="none" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linejoin="round" filter="url(#glow)" />
    
    <!-- Rear stays -->
    <path d="M 30 65 L 53 36" fill="none" stroke="url(#accentGrad)" stroke-width="2" />
    
    <!-- Seatpost & Saddle -->
    <path d="M 53 36 L 51 28" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <path d="M 43 28 L 57 28" fill="none" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Fork & Drop Handlebars -->
    <path d="M 110 65 L 98 30" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <path d="M 98 30 C 98 25, 90 22, 86 24 C 82 26, 82 32, 88 34" fill="none" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Crankset & Pedals -->
    <circle cx="67" cy="65" r="6" fill="none" stroke="#f8fafc" stroke-width="2"/>
    <path d="M 67 59 L 67 71" stroke="#f8fafc" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Text Category -->
  <text x="15" y="25" fill="#00f2fe" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" letter-spacing="1">ROAD RIDER</text>
</svg>

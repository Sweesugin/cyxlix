<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Card -->
  <rect width="200" height="120" rx="10" fill="url(#bgGrad)" />
  <line x1="10" y1="95" x2="190" y2="95" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  
  <!-- Bicycle Art Group -->
  <g transform="translate(30, 20)">
    <!-- Wheels -->
    <circle cx="30" cy="65" r="22" stroke="#64748b" stroke-width="3" fill="none" />
    <circle cx="110" cy="65" r="22" stroke="#64748b" stroke-width="3" fill="none" />
    
    <!-- Spokes -->
    <path d="M 30 43 L 30 87 M 8 65 L 52 65" stroke="#475569" stroke-width="1"/>
    <path d="M 110 43 L 110 87 M 88 65 L 132 65" stroke="#475569" stroke-width="1"/>
    
    <!-- Frame with Battery Box -->
    <path d="M 30 65 L 65 65 L 95 38 L 50 38 L 30 65 Z" fill="none" stroke="url(#accentGrad)" stroke-width="4.5" stroke-linejoin="round" filter="url(#glow)" />
    
    <!-- E-Bike Integrated Battery Pack (Thick center block) -->
    <rect x="52" y="44" width="34" height="14" rx="4" fill="url(#accentGrad)" opacity="0.8" />
    <!-- Lightning Bolt on battery -->
    <path d="M 66 54 L 72 47 L 69 47 L 73 45 L 67 52 L 70 52 Z" fill="#ffffff" />
    
    <!-- Rear chainstays -->
    <path d="M 30 65 L 50 38" fill="none" stroke="url(#accentGrad)" stroke-width="3" />
    
    <!-- Seatpost & Saddle -->
    <path d="M 50 38 L 47 28" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <path d="M 40 28 L 56 28" fill="none" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Fork & Handlebars -->
    <path d="M 110 65 L 98 32 L 95 24" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <path d="M 88 24 L 98 24" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Mid-drive Motor Center -->
    <circle cx="65" cy="65" r="9" fill="#f8fafc" />
    <circle cx="65" cy="65" r="6" fill="#1e293b" />
  </g>

  <!-- Text Category -->
  <text x="15" y="25" fill="#10b981" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" letter-spacing="1">SMART E-BIKE</text>
</svg>

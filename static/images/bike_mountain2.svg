<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Card -->
  <rect width="200" height="120" rx="10" fill="url(#bgGrad)" />
  <path d="M 10 95 L 60 92 L 110 96 L 150 90 L 190 95" stroke="rgba(255,255,255,0.1)" stroke-width="2" fill="none"/>
  
  <!-- Bicycle Art Group -->
  <g transform="translate(30, 20)">
    <!-- Wheels -->
    <circle cx="30" cy="65" r="22" stroke="#64748b" stroke-width="3" fill="none" />
    <circle cx="110" cy="65" r="22" stroke="#64748b" stroke-width="3" fill="none" />
    
    <!-- Spokes -->
    <path d="M 30 43 L 30 87 M 8 65 L 52 65" stroke="#475569" stroke-width="1"/>
    <path d="M 110 43 L 110 87 M 88 65 L 132 65" stroke="#475569" stroke-width="1"/>
    
    <!-- Frame -->
    <path d="M 30 65 L 65 65 L 95 38 L 50 38 L 30 65 Z" fill="none" stroke="url(#accentGrad)" stroke-width="4.5" stroke-linejoin="round" filter="url(#glow)" />
    <path d="M 30 65 L 55 35 M 30 65 L 50 38" fill="none" stroke="url(#accentGrad)" stroke-width="3" />
    
    <!-- Seatpost & Saddle -->
    <path d="M 50 38 L 47 28" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <path d="M 40 28 L 56 28" fill="none" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Fork & Handlebars -->
    <path d="M 110 65 L 98 32 L 95 24" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <path d="M 88 24 L 98 24" fill="none" stroke="#f8fafc" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Crankset & Pedals -->
    <circle cx="65" cy="65" r="7" fill="none" stroke="#f8fafc" stroke-width="2.5"/>
    <path d="M 65 58 L 65 72" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text Category -->
  <text x="15" y="25" fill="#ef4444" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" letter-spacing="1">MTB PRO</text>
</svg>

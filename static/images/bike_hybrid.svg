<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Card -->
  <rect width="200" height="120" rx="10" fill="url(#bgGrad)" />
  <line x1="10" y1="95" x2="190" y2="95" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  
  <!-- Bicycle Art Group -->
  <g transform="translate(30, 20)">
    <!-- Wheels -->
    <circle cx="30" cy="65" r="22" stroke="#64748b" stroke-width="2.5" fill="none" />
    <circle cx="110" cy="65" r="22" stroke="#64748b" stroke-width="2.5" fill="none" />
    
    <!-- Spokes -->
    <path d="M 30 43 L 30 87 M 8 65 L 52 65" stroke="#475569" stroke-width="1"/>
    <path d="M 110 43 L 110 87 M 88 65 L 132 65" stroke="#475569" stroke-width="1"/>
    
    <!-- Frame -->
    <path d="M 30 65 L 66 65 L 96 38 L 52 38 L 30 65 Z" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linejoin="round" filter="url(#glow)" />
    
    <!-- Stays -->
    <path d="M 30 65 L 52 38" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" />
    
    <!-- Seatpost & Saddle -->
    <path d="M 52 38 L 49 28" fill="none" stroke="url(#accentGrad)" stroke-width="3.5"/>
    <path d="M 41 28 L 56 28" fill="none" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Fork & Handlebars -->
    <path d="M 110 65 L 97 31 L 93 25" fill="none" stroke="url(#accentGrad)" stroke-width="3.5"/>
    <path d="M 86 25 L 96 25" fill="none" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Crankset & Pedals -->
    <circle cx="66" cy="65" r="6" fill="none" stroke="#f8fafc" stroke-width="2.2"/>
    <path d="M 66 59 L 66 71" stroke="#f8fafc" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Text Category -->
  <text x="15" y="25" fill="#f43f5e" font-family="'Outfit', sans-serif" font-weight="700" font-size="10" letter-spacing="1">CITY HYBRID</text>
</svg>
